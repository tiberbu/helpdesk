<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="150" r="120" fill="#CFFAFE" opacity="0.3"/>

  <!-- Robot body -->
  <rect x="150" y="140" width="100" height="100" rx="15" fill="#0891B2"/>
  <rect x="155" y="145" width="90" height="90" rx="12" fill="#06B6D4"/>

  <!-- Robot head -->
  <rect x="165" y="90" width="70" height="60" rx="12" fill="#0891B2"/>
  <rect x="170" y="95" width="60" height="50" rx="10" fill="#22D3EE"/>

  <!-- Eyes -->
  <circle cx="185" cy="115" r="8" fill="#1a1a2e"/>
  <circle cx="215" cy="115" r="8" fill="#1a1a2e"/>
  <circle cx="187" cy="113" r="3" fill="#ffffff"/>
  <circle cx="217" cy="113" r="3" fill="#ffffff"/>

  <!-- Antenna -->
  <line x1="200" y1="90" x2="200" y2="70" stroke="#0891B2" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="65" r="6" fill="#22D3EE"/>

  <!-- Smile -->
  <path d="M 185 130 Q 200 138 215 130" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Headphone band -->
  <path d="M 165 105 Q 135 105 135 135" stroke="#0E7490" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M 235 105 Q 265 105 265 135" stroke="#0E7490" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Left headphone -->
  <ellipse cx="135" cy="145" rx="18" ry="25" fill="#0E7490"/>
  <ellipse cx="135" cy="145" rx="12" ry="18" fill="#22D3EE"/>

  <!-- Right headphone -->
  <ellipse cx="265" cy="145" rx="18" ry="25" fill="#0E7490"/>
  <ellipse cx="265" cy="145" rx="12" ry="18" fill="#22D3EE"/>

  <!-- Arms -->
  <rect x="120" y="160" width="25" height="60" rx="12" fill="#0891B2"/>
  <rect x="255" y="160" width="25" height="60" rx="12" fill="#0891B2"/>

  <!-- Hands waving -->
  <circle cx="132" cy="225" r="15" fill="#06B6D4"/>
  <circle cx="268" cy="225" r="15" fill="#06B6D4"/>

  <!-- Chest panel -->
  <rect x="175" y="165" width="50" height="40" rx="8" fill="#0E7490" opacity="0.4"/>

  <!-- Sound waves (indicating active support) -->
  <path d="M 95 135 Q 85 145 95 155" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 85 130 Q 70 145 85 160" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>

  <path d="M 305 135 Q 315 145 305 155" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 315 130 Q 330 145 315 160" stroke="#22D3EE" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Chat bubble -->
  <circle cx="290" cy="100" r="30" fill="#CFFAFE"/>
  <path d="M 280 110 L 275 120 L 285 112" fill="#CFFAFE"/>
  <text x="290" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#0891B2" font-weight="bold">?</text>
</svg>
